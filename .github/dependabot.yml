version: 2

updates:
  # Python dependencies — checks requirements.txt weekly
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # python-telegram-bot is pinned intentionally — major version changes break API
      - dependency-name: "python-telegram-bot"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — keeps action versions up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
    ignore:
      # azure/login v3 changed auth API — client-secret no longer supported as standalone input
      # Pinned to v2 until OIDC federation is implemented (EXC-001 remediation)
      - dependency-name: "azure/login"
        update-types: ["version-update:semver-major"]
