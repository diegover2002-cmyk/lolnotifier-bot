# .github/workflows/release.yml
#
# Triggered when a version tag (v*.*.*) is pushed.
# Packages the app as a zip and deploys to Azure Function App.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   ARM_CLIENT_ID       → App Registration client ID
#   ARM_CLIENT_SECRET   → App Registration client secret
#   ARM_TENANT_ID       → Azure AD tenant ID
#   ARM_SUBSCRIPTION_ID → Azure subscription ID
#
# Secrets NOT stored in GitHub (managed in Azure Key Vault):
#   TELEGRAM_TOKEN, RIOT_API_KEY, TELEGRAM_CHAT_ID

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:

  # ── Package app ──────────────────────────────────────────────────────────────
  build:
    name: Package App
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Create deployment zip
        run: zip -r app.zip . -x "*.git*" -x "tests/*" -x "scripts/*" -x "terraform/*" -x "docs/*" -x ".venv/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app-package
          path: app.zip

  # ── Deploy to dev ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-package

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Deploy to Function App (dev)
        uses: azure/functions-action@v1
        with:
          app-name: func-lolnotifier-dev
          package: app.zip

  # ── Deploy to prod (requires manual approval in GitHub Environments) ─────────
  deploy-prod:
    name: Deploy → Prod
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-package

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Deploy to Function App (prod)
        uses: azure/functions-action@v1
        with:
          app-name: func-lolnotifier-prod
          package: app.zip
