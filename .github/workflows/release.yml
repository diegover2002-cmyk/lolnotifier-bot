# .github/workflows/release.yml
#
# Triggered when a version tag (v*.*.*) is pushed.
# Builds the Docker image, pushes to GitHub Container Registry,
# and updates the Azure Container App image.
#
# Required GitHub secrets:
#   AZURE_CREDENTIALS  → output of: az ad sp create-for-rbac --sdk-auth
#
# Secrets NOT stored in GitHub (managed in Azure Key Vault):
#   TELEGRAM_TOKEN, RIOT_API_KEY, TELEGRAM_CHAT_ID

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Build & push Docker image ────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to dev ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ca-lolnotifier-dev \
            --resource-group rg-lolnotifier-dev \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Verify deployment
        run: |
          az containerapp show \
            --name ca-lolnotifier-dev \
            --resource-group rg-lolnotifier-dev \
            --query "properties.latestRevisionFqdn" \
            --output tsv

  # ── Deploy to prod (requires manual approval in GitHub Environments) ─────────
  deploy-prod:
    name: Deploy → Prod
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod   # Configure protection rules + required reviewers in GitHub Settings

    steps:
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ca-lolnotifier-prod \
            --resource-group rg-lolnotifier-prod \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
